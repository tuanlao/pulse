# docker-compose stack for pulse integration tests.
#
# Brings up the three external dependencies the integration tests exercise:
#   - redis    (pkg/redis client-side cache + Locker, pkg/snowflake redis worker-id,
#               pkg/cron distributed lock)
#   - kafka    (single-node KRaft, no ZooKeeper — pkg/kafka producer/consumer,
#               examples/service e2e API -> publish -> worker)
#   - temporal (in-memory dev server — pkg/temporal saga)
#
# Usage:
#   make infra-up            # docker compose up -d + wait healthy
#   make test-integration    # go test -race -tags=integration ./...
#   make infra-down
#
# Addresses the tests read (defaults shown):
#   KAFKA_BROKERS=localhost:9092  REDIS_ADDR=localhost:6379  TEMPORAL_HOSTPORT=localhost:7233

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.7.1
    ports:
      - "9092:9092"
    environment:
      # Single-node KRaft: this node is both broker and controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # Advertised to clients on the host (the published 9092 port).
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-node: every internal topic replicates once.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 3s
      timeout: 5s
      retries: 30

  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--ip", "0.0.0.0", "--namespace", "default"]
    ports:
      - "7233:7233" # frontend gRPC
      - "8233:8233" # web UI
    healthcheck:
      test: ["CMD", "temporal", "operator", "namespace", "list", "--address", "localhost:7233"]
      interval: 3s
      timeout: 5s
      retries: 30
