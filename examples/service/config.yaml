# Example configuration for the pulse demo service. This is the SERVICE's own
# config (appConfig in main.go) — pulse has no unified app.Config; a service
# composes the component configs it needs plus its own fields.
# Config is nested-object (YAML) form only. Precedence: defaults < this file.
# Run from this directory so "." is on the config search path.

env: DEV # LOCAL | DEV | UAT | STG | PROD — drives gin mode (PROD/STG/UAT=release)
service_name: example-service
version: dev

log:
  level: info
  encoding: console # "console" -> [time][LEVEL] msg field=value ; "json" for prod

server:
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  read_header_timeout: 5s # Slowloris guard
  shutdown_drain: 25s
  max_body_bytes: 1048576 # 1 MiB
  cors:
    enabled: false

# Named upstream HTTP clients. Each is a nested object (pool/retry/trace/timeouts).
http_clients:
  self:
    base_url: http://127.0.0.1:8080
    timeouts:
      request: 10s
    pool:
      max_idle_conns_per_host: 20
    retry:
      enabled: true
      max_attempts: 3
    trace:
      trace_id_header: X-Trace-Id

metrics:
  enabled: true
  path: /metrics

tracing:
  enabled: true # false = no tracing at all (no trace_id/span_id in logs)
  protocol: grpc # or "http"
  endpoint: "" # empty = generate trace_id/span_id for logs but DON'T export (no collector needed); set e.g. localhost:4317 to export to an OTLP collector
  insecure: true
  sample_ratio: 1.0

swagger:
  enabled: false
  path: /swagger

redis:
  enabled: false # set true (and run redis >= 6) to exercise the /cache route
  addresses: ["localhost:6379"] # one = standalone; many = cluster (auto-discovered)
  # db: 0
  # username: ""
  # password: ""
  cache: # rueidis client-side caching — the headline feature (needs RESP3 / redis >= 6)
    enabled: true # false -> DoCache falls back to a normal round trip
    # size_per_conn: 134217728 # 128 MiB; 0 = rueidis default
    broadcast:
      enabled: false # true -> CLIENT TRACKING ... BCAST: server pushes invalidations per prefix
      prefixes: [] # required when broadcast.enabled, e.g. ["user:", "product:"]
  # sentinel:
  #   enabled: true
  #   master_set: mymaster
  metrics:
    enabled: true

cron:
  enabled: true
  timezone: UTC
  stop_timeout: 30s
  singleton: true # prevent a job from overlapping itself within this pod
  # job_timeout: 30s # uncomment to bound every job run
  # Jobs are declared here; handlers are bound in code via cronSched.Register(name, fn).
  jobs:
    heartbeat:
      enabled: true
      every: 5s
      # cron: "0 */1 * * *"  # alternatively a crontab spec
      # with_seconds: false
      # timeout: 10s         # per-job timeout override
  lock: # rueidis distributed mutex (redis.Locker). When redis.enabled, main.go shares that client.
    enabled: false # set true for multi-pod: each run is taken by one pod (load spread across pods)
    redis: # used only when no shared client is passed via Deps.RedisClient
      address: localhost:6379
    key_prefix: "pulse:cron"
    tries: 1 # acquire attempts before skipping the run (1 = skip if held)
    # retry_delay: 100ms # wait between attempts when tries > 1
    ttl: 30s # lock auto-expiry (releases a crashed pod's lock); should exceed a job's runtime
  metrics:
    enabled: true

kafka:
  enabled: false # set true (and run a broker) to exercise produce/consume via POST /publish/:id
  client:
    brokers: ["localhost:9092"]
    client_id: example-service
    # sasl: { enabled: true, mechanism: scram-sha-256, username: u, password: p }
    # tls:  { enabled: true }
  admin:
    auto_create: true # false = validate topics exist on Start and fail fast (production)
    partitions: 4
    replication_factor: 1 # set >= 3 in production
  producer:
    topics: ["orders"] # topics this producer publishes to — provisioned on Start
    #                    (auto_create=true -> created if missing; false -> Start fails fast if missing)
    required_acks: all
    compression: snappy
  consumer:
    group_id: example-service
    topics: ["orders"] # origin topics (these get the retry/DLQ pipeline)
    mode: unordered # unordered (high-concurrency) | ordered | key_ordered
    commit_immediately: false # true = at-most-once, high throughput, ACCEPTS message loss
    concurrency: 256
  retry:
    enabled: true
    strategy: auto # auto (unordered=retry-topics, ordered=in-place) | blocking | non_blocking
    backoffs: ["5s", "10s", "1m"] # tier delays -> orders.retry.5s / .10s / .1m
    # scope_to_group: false # true -> stamp the group so only it reprocesses a retry
    dlq:
      enabled: true # exhausted/non-retryable -> orders.dlq
  dedup:
    enabled: false # opt-in; recommended for unordered+retry to avoid reprocessing on crash
    mode: local # local (otter, per-pod) | redis (shared; needs redis.enabled)
    ttl: 1h # must exceed the total retry lifetime
    # redis: { key_prefix: "pulse:kafka:dedup", client_side_cache: true, cache_ttl: 30s }
  metrics:
    enabled: true

lifecycle:
  shutdown_timeout: 30s
  start_timeout: 15s
