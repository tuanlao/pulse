# Example configuration for the pulse demo service. This is the SERVICE's own
# config (appConfig in main.go) — pulse has no unified app.Config; a service
# composes the component configs it needs plus its own fields.
# Config is nested-object (YAML) form only. Precedence: defaults < this file.
# Run from this directory so "." is on the config search path.

env: DEV # LOCAL | DEV | UAT | STG | PROD — drives gin mode (PROD/STG/UAT=release)
service_name: example-service
version: dev

log:
  level: info
  encoding: console # "console" -> [time][LEVEL] msg field=value ; "json" for prod

server:
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  read_header_timeout: 5s # Slowloris guard
  shutdown_drain: 25s
  max_body_bytes: 1048576 # 1 MiB
  cors:
    enabled: false

# Named upstream HTTP clients. Each is a nested object (pool/retry/trace/timeouts).
http_clients:
  self:
    base_url: http://127.0.0.1:8080
    timeouts:
      request: 10s
    pool:
      max_idle_conns_per_host: 20
    retry:
      enabled: true
      max_attempts: 3
    trace:
      trace_id_header: X-Trace-Id

metrics:
  enabled: true
  path: /metrics

tracing:
  enabled: true # false = no tracing at all (no trace_id/span_id in logs)
  protocol: grpc # or "http"
  endpoint: "" # empty = generate trace_id/span_id for logs but DON'T export (no collector needed); set e.g. localhost:4317 to export to an OTLP collector
  insecure: true
  sample_ratio: 1.0

swagger:
  enabled: false
  path: /swagger

redis:
  enabled: false # set true (and run redis >= 6) to exercise the /cache route
  addresses: ["localhost:6379"] # one = standalone; many = cluster (auto-discovered)
  # db: 0
  # username: ""
  # password: ""
  cache: # rueidis client-side caching — the headline feature (needs RESP3 / redis >= 6)
    enabled: true # false -> DoCache falls back to a normal round trip
    # size_per_conn: 134217728 # 128 MiB; 0 = rueidis default
    broadcast:
      enabled: false # true -> CLIENT TRACKING ... BCAST: server pushes invalidations per prefix
      prefixes: [] # required when broadcast.enabled, e.g. ["user:", "product:"]
  # sentinel:
  #   enabled: true
  #   master_set: mymaster
  metrics:
    enabled: true

cron:
  enabled: true
  timezone: UTC
  stop_timeout: 30s
  singleton: true # prevent a job from overlapping itself within this pod
  # job_timeout: 30s # uncomment to bound every job run
  # Jobs are declared here; handlers are bound in code via cronSched.Register(name, fn).
  jobs:
    heartbeat:
      enabled: true
      every: 5s
      # cron: "0 */1 * * *"  # alternatively a crontab spec
      # with_seconds: false
      # timeout: 10s         # per-job timeout override
  lock: # rueidis distributed mutex (redis.Locker). When redis.enabled, main.go shares that client.
    enabled: false # set true for multi-pod: each run is taken by one pod (load spread across pods)
    redis: # used only when no shared client is passed via Deps.RedisClient
      address: localhost:6379
    key_prefix: "pulse:cron"
    tries: 1 # acquire attempts before skipping the run (1 = skip if held)
    # retry_delay: 100ms # wait between attempts when tries > 1
    ttl: 30s # lock auto-expiry (releases a crashed pod's lock); should exceed a job's runtime
  metrics:
    enabled: true

kafka:
  enabled: false # set true (and run a broker) to exercise produce/consume via POST /publish/:id
  client:
    brokers: ["localhost:9092"]
    client_id: example-service
    # sasl: { enabled: true, mechanism: scram-sha-256, username: u, password: p }
    # tls:  { enabled: true }
  admin:
    auto_create: true # false = validate topics exist on Start and fail fast (production)
    partitions: 4
    replication_factor: 1 # set >= 3 in production
  producer:
    topics: ["orders"] # topics this producer publishes to — provisioned on Start
    #                    (auto_create=true -> created if missing; false -> Start fails fast if missing)
    required_acks: all
    compression: snappy
  # Named consumers — each FULLY INDEPENDENT (its own group, topics, mode,
  # concurrency, retry/DLQ and dedup). Build them all at once with
  # kafka.NewConsumers(cfg.Kafka, deps) and look one up by its name (the map key)
  # to bind handlers — see main.go. The shared connection (client), admin, tracing
  # and metrics above apply to every consumer (one cluster per service).
  # For a one-off consumer you don't want in config, declare it in code instead:
  #   kafka.NewConsumer(cfg.Kafka, deps, kafka.WithGroupID(...), kafka.WithTopics(...))
  consumers:
    orders: # <- the name passed to consumers.Get("orders") in code
      group_id: example-orders
      topics: ["orders"] # origin topics (these get the retry/DLQ pipeline)
      mode: unordered # unordered (high-concurrency) | ordered | key_ordered
      commit_immediately: false # true = at-most-once, high throughput, ACCEPTS message loss
      concurrency: 256
      retry:
        enabled: true
        strategy: auto # auto (unordered=retry-topics, ordered=in-place) | blocking | non_blocking
        backoffs: ["5s", "10s", "1m"] # tier delays -> orders.retry.5s / .10s / .1m
        # scope_to_group: false # true -> stamp the group so only it reprocesses a retry
        dlq:
          enabled: true # exhausted/non-retryable -> orders.dlq
      dedup:
        enabled: false # opt-in; recommended for unordered+retry to avoid reprocessing on crash
        mode: local # local (otter, per-pod) | redis (shared; needs redis.enabled)
        ttl: 1h # must exceed the total retry lifetime
        # redis: { key_prefix: "pulse:kafka:dedup", client_side_cache: true, cache_ttl: 30s }
    audit: # a SECOND consumer: DIFFERENT group, different processing — fully its own config
      group_id: example-audit # independent group => gets its own copy of every record (fan-out)
      topics: ["orders"] # could be different topics; same topic + different group = fan-out
      mode: ordered # this one preserves per-partition order
      retry:
        enabled: false # an observer: no retry tiers / DLQ
      dedup:
        enabled: false
  metrics:
    enabled: true

snowflake:
  enabled: true
  # epoch: 1288834974657 # ms; default Twitter epoch (0 = use default)
  node_bits: 10 # 1024 worker ids; node_bits + step_bits must be <= 22
  step_bits: 12 # 4096 ids/ms/node
  worker_id:
    strategy: static # static | statefulset | redis
    static: 1 # used by strategy: static
    statefulset:
      pod_name_env: POD_NAME # used by strategy: statefulset; falls back to hostname. Errors for a Deployment.
    redis: # used by strategy: redis — pods contend for a unique slot. main.go shares the redis client when redis.enabled.
      redis:
        address: localhost:6379
      key_prefix: "pulse:snowflake:worker"
      ttl: 15s # slot lease auto-expiry (frees a crashed pod's slot)
      # renew_interval: 5s # default ttl/3
      # max_id: 0 # 0 = 2^node_bits slots
  metrics:
    enabled: true

temporal:
  enabled: false # set true (and run `temporal server start-dev`) to exercise the saga demo via POST /transfer
  connection:
    host_port: localhost:7233
    namespace: default
    # identity: "" # default: SDK derives pid@hostname
    tls:
      enabled: false
      # ca_file / cert_file / key_file / server_name for mutual TLS
  client:
    default_workflow_task_timeout: 10s
  worker:
    enabled: true # independent of the client: a frontend that only starts workflows can leave this false
    task_queue: example-service-tasks # REQUIRED when enabled (main.go defaults it from service_name)
    stop_timeout: 30s
    # --- OOM / memory controls ---
    sticky:
      cache_size: 10000 # PROCESS-GLOBAL across all workers in this process; first non-zero value wins
      schedule_to_start_timeout: 5s
    resource_tuner: # opt-in dynamic slot throttling; MUTUALLY EXCLUSIVE with concurrency.* execution caps
      enabled: false
      target_memory: 0.8 # keep system memory under 80%
      target_cpu: 0.9
    concurrency: # used only when resource_tuner.enabled = false
      max_concurrent_workflow_task_execution_size: 1000
      max_concurrent_activity_execution_size: 1000
      max_concurrent_local_activity_execution_size: 1000
      max_concurrent_workflow_task_pollers: 2
      max_concurrent_activity_task_pollers: 2
  history: # Continue-As-New guard: bounds a single run's history (the headline lever against ballooning history)
    max_events: 10000 # CAN when the event count reaches this
    max_bytes: 20971520 # 20 MiB; CAN when history size reaches this
    # ignore_server_suggestion: false # false = also CAN when the Temporal server suggests it
  metrics:
    enabled: true # bridge the SDK's own metrics into the shared Prometheus registry via tally
    prefix: temporal
  tracing:
    enabled: true

grpc:
  port: 9090
  enable_health: true
  enable_reflection: true # dev convenience: `grpcurl -plaintext localhost:9090 list`
  # max_recv_msg_size: 4194304
  # keepalive: { time: 2h, timeout: 20s, max_connection_age: 0 }
  # tls: { enabled: true, cert_file: server.pem, key_file: server-key.pem, client_ca_file: ca.pem } # client_ca_file => mTLS
  metrics:
    enabled: true

grpc_client:
  target: 127.0.0.1:9090 # defaults to this service's gRPC server when empty (main.go)
  timeouts:
    request: 10s # per-call deadline applied only when the caller ctx has none
  retry:
    enabled: true
    max_attempts: 3
    retryable_status_codes: ["UNAVAILABLE"]
  trace:
    trace_id_header: x-trace-id # metadata keys are lowercased by gRPC
  # tls: { enabled: true, ca_file: ca.pem, server_name_override: localhost } # ca_file optional (empty = system roots)
  metrics:
    enabled: true

lifecycle:
  shutdown_timeout: 30s
  start_timeout: 15s
